# AI-relevance classification config (v2 — tiered/scored)
#
# Version this file. Store ai_relevance_version alongside each flagged record
# so that tightening or loosening the definition doesn't silently shift
# historical stats. v1 was a single binary keyword+CPV match, which flagged most
# government IT as "AI"; v2 scores into strong / weak / none so the dashboard can
# default to high-precision (strong) and offer weak behind a toggle.
version: "2.0"

# Keyword matching is case-insensitive, applied to (title + description).

# Strong: on their own, sufficient to classify a notice as 'strong'.
strong_keywords:
  - artificial intelligence
  - machine learning
  - deep learning
  - neural network
  - large language model
  - llm
  - generative ai
  - natural language processing
  - computer vision
  - automated decision
  - foundation model

# Weak: soft signals. Alone → 'weak'. Combined with a strong CPV code → 'strong'.
weak_keywords:
  - algorithm
  - algorithmic
  - predictive
  - automation
  - data science
  - chatbot
  - optimisation model

# CPV code matching — a prefix; any of a notice's cpv_codes starting with it
# matches. There is no dedicated AI code in the CPV 2008 vocabulary, so CPV is
# never sufficient alone for 'strong' — only the narrower strong set elevates a
# weak keyword to strong.
strong_cpv_prefixes:
  - "7222"   # Systems and technical consultancy
  - "7223"   # Data processing services
weak_cpv_prefixes:
  - "7221"   # Programming services
  - "7224"   # Database services
  - "7226"   # Computer-related services
  - "7231"   # Computer programming services
  - "7232"   # Internet services
  - "4800"   # Software package and information systems
  - "4815"   # Database software packages
  - "4816"   # Exchange software packages
  - "4817"   # Office software packages

# Scoring (implemented in src/ingest/ai_relevance.classify):
#   strong : any strong_keyword  OR  (any weak_keyword AND any strong_cpv)
#   weak   : any weak_keyword     OR  any strong_cpv  OR  any weak_cpv
#   none   : otherwise
